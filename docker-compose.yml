version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: okx-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: okx_sim
      MYSQL_USER: okx_user
      MYSQL_PASSWORD: okx_pass123
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/1-init.sql
      - ./sql/option_contracts.sql:/docker-entrypoint-initdb.d/2-option.sql
    ports:
      - "3306:3306"
    networks:
      - okx-network
    command: --default-authentication-plugin=mysql_native_password

  redis:
    image: redis:7-alpine
    container_name: okx-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - okx-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: okx-backend
    restart: always
    environment:
      NODE_ENV: production
      DB_HOST: mysql
      DB_USER: okx_user
      DB_PASSWORD: okx_pass123
      DB_NAME: okx_sim
      DB_PORT: 3306
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: okx-sim-pro-secret-key-for-jwt-signing
      PORT: 3000
      USE_MYSQL: "true"
    ports:
      - "3000:3000"
    depends_on:
      - mysql
      - redis
    networks:
      - okx-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: okx-frontend
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - okx-network

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: okx-admin
    restart: always
    ports:
      - "8081:80"
    depends_on:
      - backend
    networks:
      - okx-network

volumes:
  mysql_data:
  redis_data:

networks:
  okx-network:
    driver: bridge